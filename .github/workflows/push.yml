name: Push Workflows

on:
  push:
    branches:
      - master
      - release/**

jobs:
  ci:
    name: Continue Integration
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  cd:
    name: Continue Deployment
    uses: ./.github/workflows/cd.yml
    secrets: inherit
    needs: [ci]

  publish-github-page:
    name: Publish GitHub Page
    if: ${{ always() }}
    uses: ./.github/actions/publish-github-page.yml
    secrets: inherit
    needs: [ci]
