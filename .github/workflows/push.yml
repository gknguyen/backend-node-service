name: Push Workflows

on:
  push:
    branches:
      - master
      - release/**

jobs:
  ci:
    name: Continue Integration
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  cd:
    name: Continue Deployment
    uses: ./.github/workflows/cd.yml
    secrets: inherit
    needs: [ci]

  publish-reports:
    name: Publish Reports
    if: ${{ always() }}
    uses: ./.github/workflows/publish.yml
    secrets: inherit
    needs: [ci]
