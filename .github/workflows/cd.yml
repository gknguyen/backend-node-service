name: Continue Deployment

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner'
        type: string
        required: false
        default: 'ubuntu-latest'

jobs:
  release-tag:
    name: Release Tag
    uses: ./.github/workflows/release-tag.yml
    secrets: inherit
    with:
      runner: ${{ inputs.runner }}
