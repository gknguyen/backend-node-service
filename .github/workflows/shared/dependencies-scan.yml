on:
  workflow_call:
    inputs:
      RUNNER:
        description: 'Runner'
        type: string
        required: false
        default: 'ubuntu-latest'

jobs:
  dependencies-scan:
    name: Dependencies Scan
    runs-on: ['${{ inputs.RUNNER }}']
    timeout-minutes: 10

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'

      - name: Restore cached node_modules
        uses: actions/cache@v4
        id: cache-npm
        with:
          path: ${{ github.workspace }}/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-npm-
            ${{ runner.os }}-

      - name: Install dependencies if cache missed
        if: ${{ steps.cache-npm.outputs.cache-hit != 'true' }}
        run: npm ci

      - name: Generate & add audit markdown report to PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: oke-py/npm-audit-action@v3
        with:
          working_directory: ./
          github_token: ${{ secrets.GITHUB_TOKEN }}
          audit_level: high
          create_issues: false
          create_pr_comments: true

      - name: Generate audit html report
        if: ${{ always() }}
        run: |
          npm i -g audit-export
          npm audit --json | audit-export --title "NPM Audit Report"

      - name: Archive audit html report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: report-vulnerability-dependencies
          path: ./audit-report.html
          retention-days: 1
          include-hidden-files: false
