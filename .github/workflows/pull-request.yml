name: Pull Request Workflows

on:
  pull_request:
    branches:
      - master
      - release/**

jobs:
  ci:
    name: Continue Integration
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # test
  publish-reports:
    name: Publish Reports
    if: ${{ always() }}
    uses: ./.github/workflows/publish.yml
    secrets: inherit
    needs: [ci]
